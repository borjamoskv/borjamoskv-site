<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORTEX LEXICON | Semantic Patent</title>
  <meta name="description" content="Prior Art and Canonical Semantic Definitions for Sovereign Engineering by Borja Moskv.">
  <link rel="stylesheet" href="/article.css">
  <link rel="stylesheet" href="/cortex-terminal.css">
  <style>
    body { background-color: #0A0A0A; color: #E0E0E0; font-family: 'Inter', 'Outfit', sans-serif; margin: 0; padding: 0;}
    .lexicon-container { max-width: 800px; margin: 4rem auto; padding: 2rem; border-left: 3px solid #2B3BE5; }
    h1 { color: #ffffff; letter-spacing: -1px; text-transform: uppercase; font-size: 2.5rem; margin-bottom: 0.5rem; }
    .status { font-family: monospace; color: #2B3BE5; margin-bottom: 3rem; font-size: 1.1rem;}
    .term-block { margin-bottom: 2.5rem; background: #111111; padding: 1.5rem; border-radius: 4px; transition: transform 0.2s ease; border: 1px solid #1a1a1a;}
    .term-block:hover { transform: translateX(5px); border-color: #2B3BE5; }
    .term-name { color: #2B3BE5; font-size: 1.5rem; margin: 0 0 0.5rem 0; font-weight: 700; }
    .term-def { line-height: 1.6; margin-bottom: 1rem; color: #CCCCCC; font-size: 1.1rem;}
    .term-meta { font-family: monospace; font-size: 0.85rem; color: #666666; border-top: 1px dashed #333; padding-top: 0.75rem; }
    
    @media (max-width: 600px) {
      .lexicon-container { margin: 2rem 1rem; padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="lexicon-container">
    <h1>CORTEX LEXICON</h1>
    <div class="status">STATE: C5-REAL // PRIOR_ART_LOCK_ENABLED</div>
    
    <div id="terms-render"></div>
  </div>

  <script>
    fetch('/cortex-lexicon.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('terms-render');
        data.terms.forEach(t => {
          const block = document.createElement('div');
          block.className = 'term-block';
          block.innerHTML = `
            <h2 class="term-name">${t.term}</h2>
            <p class="term-def">${t.definition}</p>
            <div class="term-meta">ID: [${t.id}] | Minted: ${t.first_minted} | Auth: Borja Moskv</div>
          `;
          container.appendChild(block);
        });
      });
  </script>
</body>
</html>
