  - generic [ref=e425]:
    - generic [ref=e426]: Señal base
    - 'heading "Lore Electrónico: Borja Moskv Multiverso" [level=2] [ref=e427]'
    - paragraph [ref=e428]: Borja Moskv mezcla música, visuales, escritura y sistemas digitales desde Bilbao. No como disciplinas separadas, sino como partes del mismo proyecto.
    - generic [ref=e429]:
      - article [ref=e430]:
        - generic [ref=e431]: Música
        - heading "Costumbrismo con máquinas" [level=3] [ref=e432]
        - paragraph [ref=e433]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e434]:
        - generic [ref=e435]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e436]
        - paragraph [ref=e437]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e438]:
        - generic [ref=e439]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e440]
        - paragraph [ref=e441]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e442]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e443]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e444]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e445]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e446]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
