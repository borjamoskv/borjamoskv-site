  - generic [ref=e426]:
    - generic [ref=e427]: Señal base
    - 'heading "Lore Electrónico: Borja Moskv Multiverso" [level=2] [ref=e428]'
    - paragraph [ref=e429]: Borja Moskv mezcla música, visuales, escritura y sistemas digitales desde Bilbao. No como disciplinas separadas, sino como partes del mismo proyecto.
    - generic [ref=e430]:
      - article [ref=e431]:
        - generic [ref=e432]: Música
        - heading "Costumbrismo con máquinas" [level=3] [ref=e433]
        - paragraph [ref=e434]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e435]:
        - generic [ref=e436]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e437]
        - paragraph [ref=e438]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e439]:
        - generic [ref=e440]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e441]
        - paragraph [ref=e442]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e443]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e444]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e445]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e446]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e447]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
