  - generic [ref=e129]:
    - generic [ref=e130]: Señal base
    - 'heading "Lore Electrónico: Borja Moskv Multiverso" [level=2] [ref=e131]'
    - paragraph [ref=e132]: Borja Moskv mezcla música, visuales, escritura y sistemas digitales desde Bilbao. No como disciplinas separadas, sino como partes del mismo proyecto.
    - generic [ref=e133]:
      - article [ref=e134]:
        - generic [ref=e135]: Música
        - heading "Costumbrismo con máquinas" [level=3] [ref=e136]
        - paragraph [ref=e137]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e138]:
        - generic [ref=e139]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e140]
        - paragraph [ref=e141]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e142]:
        - generic [ref=e143]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e144]
        - paragraph [ref=e145]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e146]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e147]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e148]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e149]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e150]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
