    - generic [ref=e500]: Señal base
    - 'heading "Lore Electrónico: Borja Moskv Multiverso" [level=2] [ref=e501]'
    - paragraph [ref=e502]: Borja Moskv mezcla música, visuales, escritura y sistemas digitales desde Bilbao. No como disciplinas separadas, sino como partes del mismo proyecto.
    - generic [ref=e503]:
      - article [ref=e504]:
        - generic [ref=e505]: Música
        - heading "Costumbrismo con máquinas" [level=3] [ref=e506]
        - paragraph [ref=e507]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e508]:
        - generic [ref=e509]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e510]
        - paragraph [ref=e511]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e512]:
        - generic [ref=e513]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e514]
        - paragraph [ref=e515]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e516]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e517]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e518]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e519]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e520]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
