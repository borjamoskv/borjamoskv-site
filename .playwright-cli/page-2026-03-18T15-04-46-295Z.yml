        - paragraph [ref=e112]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e113]:
        - generic [ref=e114]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e115]
        - paragraph [ref=e116]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e117]:
        - generic [ref=e118]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e119]
        - paragraph [ref=e120]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e121]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e122]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e123]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e124]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e125]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
