  - generic [ref=e172]:
    - generic [ref=e173]: Señal base
    - 'heading "Lore Electrónico: Borja Moskv Multiverso" [level=2] [ref=e174]'
    - paragraph [ref=e175]: Borja Moskv mezcla música, visuales, escritura y sistemas digitales desde Bilbao. No como disciplinas separadas, sino como partes del mismo proyecto.
    - generic [ref=e176]:
      - article [ref=e177]:
        - generic [ref=e178]: Música
        - heading "Costumbrismo con máquinas" [level=3] [ref=e179]
        - paragraph [ref=e180]: IDM, ambient, techno y reworks con relato, tensión y bastante sentido del humor.
      - article [ref=e181]:
        - generic [ref=e182]: Alias
        - heading "Bakala de Troya y otras mutaciones" [level=3] [ref=e183]
        - paragraph [ref=e184]: "Los nombres no maquillan el proyecto: abren distintos modos de directo, tono y presencia."
      - article [ref=e185]:
        - generic [ref=e186]: Territorio
        - heading "Bilbao, no Berlín" [level=3] [ref=e187]
        - paragraph [ref=e188]: Humedad, ironía, barrio y una voluntad bastante seria de complicarlo todo un poco más.
    - paragraph [ref=e189]: Si todo esto parece un plan, no lo es. Es más bien una acumulación de decisiones ligeramente dudosas tomadas con bastante convicción.
    - paragraph [ref=e190]: Me llamo Borja Moskv, pero eso es verdad a medias. Hay días que soy Bakala de Troya, otros Flamenc Osmic, otros Boney Mdma & Neil Ráyadon. Más que máscaras, son modos de funcionamiento.
    - paragraph [ref=e191]: "Todo lo que hago —música, visuales, textos, proyectos digitales, sets y relatos— responde a la misma manía: construir un universo propio donde la electrónica no es solo baile, sino también relato, ironía y pensamiento de barrio."
    - paragraph [ref=e192]: No persigo la novedad. Persigo la coherencia rara. Que alguien entre, escuche dos piezas distintas y aun así note que salen de la misma cabeza.
    - paragraph [ref=e193]: Todo esto sale de Bilbao. Podría simplificarlo. Pero entonces no tendría gracia.
