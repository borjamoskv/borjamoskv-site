<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galería virtual // borja_moskv</title>
    <meta name="description" content="Paseo tridimensional interactivo por las obras de arte generativo de Borja Moskv, impulsado por Three.js.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --yinmn: #1E2FD5;
            --yinmn-light: #4D5FFF;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Outfit', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #FFF;
            font-family: var(--font-sans);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        /* HUD overlay */
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            inset: 0;
            padding: 2.5rem;
        }
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hud-title {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--yinmn-light);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .live-dot {
            width: 6px; height: 6px;
            background: #FF2B56;
            border-radius: 50%;
            box-shadow: 0 0 10px #FF2B56;
            animation: pulse 1.5s infinite;
        }
        .hud-exit {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 3px;
            pointer-events: auto;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .hud-exit:hover {
            border-color: var(--yinmn);
            color: #FFF;
            box-shadow: 0 0 15px rgba(30, 47, 213, 0.3);
        }
        .hud-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .crosshair {
            width: 8px; height: 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        .pointer-prompt {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.12em;
            background: rgba(5, 5, 5, 0.85);
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            pointer-events: auto;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .pointer-prompt:hover {
            border-color: var(--yinmn-light);
            color: #FFF;
        }
        .hud-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .controls-card {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(5, 5, 5, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 4px;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }
        .controls-card strong { color: var(--yinmn-light); }
        
        .artwork-overlay {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid var(--yinmn);
            padding: 1.5rem;
            border-radius: 4px;
            max-width: 320px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 30px rgba(30, 47, 213, 0.15);
        }
        .artwork-overlay.visible {
            transform: translateY(0);
            opacity: 1;
        }
        .artwork-overlay h4 {
            font-family: var(--font-sans);
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 0.4rem;
            color: #FFF;
        }
        .artwork-overlay p {
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="hud">
        <div class="hud-header">
            <div class="hud-title">
                <div class="live-dot"></div>
                <span>moskv_gallery // render_engine_v3.5</span>
            </div>
            <a href="index.html" class="hud-exit">[exit_museum]</a>
        </div>

        <div class="hud-center">
            <div class="crosshair"></div>
            <button id="lock-btn" class="pointer-prompt">click_to_walk_around</button>
        </div>

        <div class="hud-footer">
            <div class="controls-card">
                <strong>[W, A, S, D]</strong> walking_path<br>
                <strong>[mouse]</strong> camera_rotation<br>
                <strong>[esc]</strong> free_mouse
            </div>

            <div id="artwork-card" class="artwork-overlay">
                <h4 id="art-title">artwork_title</h4>
                <p id="art-desc">procedural generation algorithms active.</p>
            </div>
        </div>
    </div>

    <!-- Three.js Setup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Core 3D Gallery Engine ---
        const container = document.getElementById('canvas-container');
        const lockBtn = document.getElementById('lock-btn');
        const artCard = document.getElementById('artwork-card');
        const artTitle = document.getElementById('art-title');
        const artDesc = document.getElementById('art-desc');

        // Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.04);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 8); // Human perspective height

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Ambient & Directional Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.08);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.15);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ambient Dust Particle Cloud (x10000 Premium atmosphere)
        const particleCount = 450;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for(let i=0; i<particleCount*3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 15;
            positions[i+1] = Math.random() * 5;
            positions[i+2] = (Math.random() - 0.5) * 28;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x4D5FFF,
            size: 0.045,
            transparent: true,
            opacity: 0.35
        });
        const dustCloud = new THREE.Points(particleGeo, particleMat);
        scene.add(dustCloud);

        // Architectural Space (Premium Gallery Room)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x09090b, roughness: 0.85 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x030304, roughness: 0.35, metalness: 0.2 });
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x060608, roughness: 0.9 });

        const roomWidth = 16, roomHeight = 5, roomDepth = 30;

        // Floor
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Ceiling
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomDepth), roofMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = roomHeight;
        scene.add(ceiling);

        // Walls
        const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomDepth, roomHeight), wallMat);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-roomWidth / 2, roomHeight / 2, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomDepth, roomHeight), wallMat);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.position.set(roomWidth / 2, roomHeight / 2, 0);
        scene.add(rightWall);

        const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), wallMat);
        backWall.position.set(0, roomHeight / 2, -roomDepth / 2);
        scene.add(backWall);

        const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(roomWidth, roomHeight), wallMat);
        frontWall.rotation.y = Math.PI;
        frontWall.position.set(0, roomHeight / 2, roomDepth / 2);
        scene.add(frontWall);

        // Ceiling Linear Neons
        const neonGeo = new THREE.BoxGeometry(0.06, 0.03, roomDepth);
        const neonMat = new THREE.MeshBasicMaterial({ color: 0x1E2FD5 });
        
        const neon1 = new THREE.Mesh(neonGeo, neonMat);
        neon1.position.set(-roomWidth / 3, roomHeight - 0.02, 0);
        scene.add(neon1);

        const neon2 = new THREE.Mesh(neonGeo, neonMat);
        neon2.position.set(roomWidth / 3, roomHeight - 0.02, 0);
        scene.add(neon2);

        // Architectural Pillars
        const pillarGeo = new THREE.BoxGeometry(0.8, roomHeight, 0.8);
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x050507, roughness: 0.65 });
        for (let z = -10; z <= 10; z += 10) {
            const p1 = new THREE.Mesh(pillarGeo, pillarMat);
            p1.position.set(-roomWidth / 2 + 0.4, roomHeight / 2, z);
            scene.add(p1);

            const p2 = new THREE.Mesh(pillarGeo, pillarMat);
            p2.position.set(roomWidth / 2 - 0.4, roomHeight / 2, z);
            scene.add(p2);
        }

        // Procedural Artwork Specs
        const artSpecs = [
            { title: "nebula_cluster", desc: "procedural gas dispersion simulation.", color: 0x1E2FD5, z: -12, wall: "left", shape: "torus" },
            { title: "geometric_chaos", desc: "abstract orthogonal intersections.", color: 0xD40056, z: -6, wall: "left", shape: "dodecahedron" },
            { title: "horizon_line", desc: "coastal dynamic scanlines.", color: 0x00FF9D, z: 6, wall: "left", shape: "cylinder" },
            { title: "minimal_dot", desc: "crystalline atomic concentration.", color: 0xffffff, z: 12, wall: "left", shape: "sphere" },
            { title: "data_wave", desc: "fluid wave spectrum modeling.", color: 0x1E2FD5, z: -10, wall: "right", shape: "torusKnot" },
            { title: "golden_silence", desc: "isolated solar light reflection.", color: 0xFF9F1C, z: 0, wall: "right", shape: "octahedron" }
        ];

        const artworks = [];

        // Mount Artwork Frames + FLOAT 3D Shapes (x10000 Premium level)
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x030304, roughness: 0.95 });
        const canvasMat = new THREE.MeshBasicMaterial({ color: 0x080809 });

        artSpecs.forEach(spec => {
            const frameGroup = new THREE.Group();

            // 1. Frame base
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.2, 2.2), frameMat);
            const canvas = new THREE.Mesh(new THREE.PlaneGeometry(2.1, 2.1), canvasMat);
            
            if (spec.wall === "left") {
                frame.position.set(-roomWidth / 2 + 0.1, 2.2, spec.z);
                canvas.rotation.y = Math.PI / 2;
                canvas.position.set(-roomWidth / 2 + 0.16, 2.2, spec.z);
            } else {
                frame.position.set(roomWidth / 2 - 0.1, 2.2, spec.z);
                canvas.rotation.y = -Math.PI / 2;
                canvas.position.set(roomWidth / 2 - 0.16, 2.2, spec.z);
            }
            
            scene.add(frame);
            scene.add(canvas);

            // 2. Floating 3D Procedural Mesh inside frame
            let geom;
            if (spec.shape === "torus") geom = new THREE.TorusGeometry(0.5, 0.15, 12, 36);
            else if (spec.shape === "dodecahedron") geom = new THREE.DodecahedronGeometry(0.6);
            else if (spec.shape === "cylinder") geom = new THREE.CylinderGeometry(0.4, 0.4, 1.0, 16);
            else if (spec.shape === "sphere") geom = new THREE.SphereGeometry(0.5, 16, 16);
            else if (spec.shape === "torusKnot") geom = new THREE.TorusKnotGeometry(0.38, 0.12, 64, 8);
            else geom = new THREE.OctahedronGeometry(0.6);

            const specMeshMat = new THREE.MeshStandardMaterial({
                color: spec.color,
                wireframe: true,
                roughness: 0.3,
                metalness: 0.8,
                emissive: spec.color,
                emissiveIntensity: 0.4
            });

            const floatingMesh = new THREE.Mesh(geom, specMeshMat);
            
            // Positioning mesh in front of frame
            if (spec.wall === "left") {
                floatingMesh.position.set(-roomWidth / 2 + 0.6, 2.2, spec.z);
            } else {
                floatingMesh.position.set(roomWidth / 2 - 0.6, 2.2, spec.z);
            }

            scene.add(floatingMesh);

            artworks.push({
                mesh: floatingMesh,
                title: spec.title,
                desc: spec.desc
            });

            // Dedicated Spotlight above each frame
            const spotLight = new THREE.SpotLight(spec.color, 1.4, 6, Math.PI / 5, 0.5, 1);
            spotLight.position.set(frame.position.x + (spec.wall === "left" ? 1.6 : -1.6), 3.8, spec.z);
            spotLight.target = frame;
            scene.add(spotLight);
        });

        // Pointer Lock Controls (WASD Movement)
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isLocked = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        lockBtn.addEventListener('click', () => {
            container.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === container) {
                lockBtn.style.display = 'none';
                isLocked = true;
            } else {
                lockBtn.style.display = 'block';
                isLocked = false;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (!isLocked) return;
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // Mouse look around
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= e.movementX * 0.0018;
            euler.x -= e.movementY * 0.0018;
            euler.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, euler.x));

            camera.quaternion.setFromEuler(euler);
        });

        // Collision bounds limits
        const checkBounds = () => {
            const boundaryX = roomWidth / 2 - 1.2;
            const boundaryZ = roomDepth / 2 - 1.2;
            
            if (camera.position.x < -boundaryX) camera.position.x = -boundaryX;
            if (camera.position.x > boundaryX) camera.position.x = boundaryX;
            if (camera.position.z < -boundaryZ) camera.position.z = -boundaryZ;
            if (camera.position.z > boundaryZ) camera.position.z = boundaryZ;
        };

        // Proximity detection for HUD artwork details
        const updateArtProximity = () => {
            let activeArt = null;
            let minDist = 3.5; // proximity limit

            artworks.forEach(art => {
                const dist = camera.position.distanceTo(art.mesh.position);
                if (dist < minDist) {
                    minDist = dist;
                    activeArt = art;
                }
            });

            if (activeArt) {
                artTitle.innerText = activeArt.title;
                artDesc.innerText = activeArt.desc;
                artCard.classList.add('visible');
            } else {
                artCard.classList.remove('visible');
            }
        };

        // Animation Loop
        const clock = new THREE.Clock();
        const animate = () => {
            requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();

            // Rotate 3D floating artworks dynamically
            artworks.forEach((art, i) => {
                art.mesh.rotation.y = elapsed * 0.4 + i;
                art.mesh.rotation.x = elapsed * 0.2;
                art.mesh.position.y = 2.2 + Math.sin(elapsed * 1.5 + i) * 0.08; // float bobbing
            });

            // Float ambient dust clouds
            const posAttr = dustCloud.geometry.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                let py = posAttr.getY(i);
                py -= 0.0025; // drift down
                if (py < 0) py = 5; // wrap ceiling
                posAttr.setY(i, py);
            }
            dustCloud.geometry.attributes.position.needsUpdate = true;

            if (isLocked) {
                const delta = clock.getDelta();

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 35.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 35.0 * delta;

                camera.translateX(-velocity.x * delta);
                camera.translateZ(velocity.z * delta);

                // Walking head-bobbing mechanics
                let bob = 1.7;
                if (moveForward || moveBackward || moveLeft || moveRight) {
                    bob += Math.sin(elapsed * 10) * 0.04;
                }
                camera.position.y = bob;

                checkBounds();
                updateArtProximity();
            }

            renderer.render(scene, camera);
        };
        animate();

        // Responsive handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
