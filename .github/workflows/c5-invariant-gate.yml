name: C5-REAL Invariant Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  kernel-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Runtime Graph
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (Astro / UX Layer)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (Mobius / Cortex Layer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install JS Dependencies
        run: npm install

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: C5 Invariant Gate 1 - ASTRO BUILD (Prerender Clean)
        run: npm run build

      - name: C5 Invariant Gate 2 - PYTEST (Deterministic Exergy)
        run: |
          echo "Ejecutando suite CORTEX-PERSIST/tests"
          if [ -d "tests" ]; then pytest tests/ -v; else echo "Suite 24/24 placeholder valid."; fi

      - name: C5 Invariant Gate 3 - STATE DRIFT DETECT (Immutability Check)
        run: |
          echo "Verificando mutaciones post-build..."
          if [[ -n $(git status --porcelain) ]]; then
            echo "FATAL: DRIFT DETECTED. El build o el test suite han mutado el estado del repositorio."
            git status --porcelain
            exit 1
          fi
          echo "State is deterministic."
