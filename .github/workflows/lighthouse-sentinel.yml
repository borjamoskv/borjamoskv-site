name: Lighthouse Sentinel OMEGA (C5-REAL)

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  lighthouse-sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install dependencies
        working-directory: ./lp-lanzamiento
        run: npm ci || npm install
      
      - name: Build Project
        working-directory: ./lp-lanzamiento
        run: npm run build
      
      - name: Lighthouse Sentinel Audit & PR Comment
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lp-lanzamiento/.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
